<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 – Сторінку не знайдено</title>
    <style>
      :root {
        --zinc-50: #FAFAFA;
        --zinc-600: #52525B;
        --primary: #015873;
      }
      body { 
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; 
        margin: 0; 
        padding: 0; 
        background: var(--zinc-50);
        color: #111; 
        min-height: 100vh;
      }
      .wrap { 
        min-height: 100vh; 
        display: grid; 
        place-items: center; 
        padding: 24px; 
      }
      .frame { 
        width: 100%;
        max-width: 648px; 
        display: grid;
        place-items: center;
        position: relative;
      }
      .frame::before {
        content: '404';
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -55%);
        font-weight: 800;
        font-size: clamp(160px, 32vw, 420px);
        line-height: 1;
        color: rgba(0,0,0,.06);
        pointer-events: none;
        user-select: none;
      }
      .content { 
        width: 100%;
        max-width: 384px; 
        text-align: center;
      }
      h1 { 
        margin: 64px 0 12px; 
        font-size: 28px; 
        font-weight: 600; 
        color: #000;
        line-height: 1.2;
      }
      p { 
        margin: 0 0 40px; 
        color: var(--zinc-600); 
        font-size: 16px;
        line-height: 1.5;
        letter-spacing: .16px;
      }
      
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="frame">
        <div class="content">
          <h1>Сторінку не знайдено</h1>
          <p>Ми не можемо знайти сторінку яку ви шукаєте.</p>
        </div>
      </div>
    </div>
  </body>
</html>
